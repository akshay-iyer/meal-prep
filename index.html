<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rasoi">
<meta name="theme-color" content="#1C0F07">
<title>Rasoi</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --saffron:#D4651A;
  --gold:#C8902A;
  --cream:#FAF4EC;
  --deep:#1C0F07;
  --bark:#3A1E0A;
  --muted:#957060;
  --card:#FFFCF7;
  --border:#E6D0B8;
  --green:#3D6B38;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
html,body{height:100%;background:var(--cream);overscroll-behavior:none}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--cream);color:var(--bark);
  max-width:430px;margin:0 auto;
  min-height:100%;display:flex;flex-direction:column;
  overflow-x:hidden;
}

.hdr{
  background:var(--deep);
  padding:calc(var(--st) + 14px) 18px 12px;
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:'Lora',serif;font-size:1.75rem;color:var(--gold);letter-spacing:-0.5px}
.hdr-sub{font-size:0.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}

.tabs{
  background:var(--deep);display:flex;
  border-top:1px solid #2e1a0a;
  position:sticky;top:calc(var(--st) + 55px);z-index:49;
}
.tab{
  flex:1;padding:9px 2px 7px;text-align:center;
  font-size:0.62rem;font-weight:600;color:var(--muted);
  letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;
  border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;
}
.tab .ti{display:block;font-size:1.05rem;margin-bottom:2px}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

.pane{display:none;flex:1;padding:14px 14px calc(14px + var(--sb))}
.pane.on{display:block}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}

.vibe-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px}
.vchip{
  width:100%;padding:9px 6px;border-radius:20px;
  font-size:0.78rem;font-weight:600;border:1.5px solid var(--border);
  background:var(--card);color:var(--bark);cursor:pointer;
  transition:all 0.15s;text-align:center;font-family:inherit;
}
.vchip.on{background:var(--saffron);border-color:var(--saffron);color:#fff}

.btn{
  display:block;width:100%;padding:14px;border:none;border-radius:13px;
  font-size:0.95rem;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:0.2px;transition:opacity 0.15s,transform 0.1s;
}
.btn:active{transform:scale(0.97);opacity:0.88}
.btn-primary{background:var(--saffron);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--saffron);color:var(--saffron);margin-top:8px}
.btn-sm{display:inline-block;width:auto;padding:6px 13px;font-size:0.75rem;border-radius:9px}

.week-grid{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.day-hdr{
  background:var(--bark);color:var(--gold);
  padding:7px 13px;display:flex;justify-content:space-between;align-items:center;
  font-family:'Lora',serif;font-size:0.9rem;
}
.day-tag{font-family:'DM Sans',sans-serif;font-size:0.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.meals-grid{display:grid;grid-template-columns:1fr 1fr}
.meal-cell{padding:10px 11px;border-right:1px solid var(--border)}
.meal-cell:last-child{border-right:none}
.meal-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin-bottom:3px}
.meal-name{font-size:0.82rem;font-weight:600;line-height:1.3;margin-bottom:5px}
.meal-same{font-size:0.82rem;color:var(--muted);font-style:italic;margin-bottom:5px}
.macro-bar{font-size:0.68rem;color:var(--muted);margin-top:5px;line-height:1.5}
.macro-bar span{color:var(--bark);font-weight:600}
.macro-detail{font-size:0.63rem;color:var(--muted);margin-top:1px}
.macro-detail span{color:var(--bark)}
.badge{font-size:0.6rem;padding:2px 6px;border-radius:8px;font-weight:600;display:inline-block;margin-right:3px}
.b-quick{background:#DCEDC8;color:#2E6B1A}
.b-medium{background:#FFF3E0;color:#C65000}
.b-prep{background:#E3F2FD;color:#1565C0}
.b-long{background:#EDE7F6;color:#4527A0}
.b-same{background:#E8F5E9;color:#2E7D32}
.edit-btn{
  font-size:0.62rem;color:var(--muted);cursor:pointer;
  background:none;border:none;font-family:inherit;padding:0;
  text-decoration:underline;margin-top:2px;display:inline-block;
}

.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.6);z-index:200;
  align-items:flex-end;justify-content:center;
}
.modal-bg.on{display:flex}
.modal{
  background:var(--card);border-radius:20px 20px 0 0;
  width:100%;max-width:430px;max-height:88vh;
  display:flex;flex-direction:column;
  transition:margin-bottom 0.2s ease;
}
.modal-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 0;flex-shrink:0;
}
.modal-title{font-family:'Lora',serif;font-size:1.05rem}
.modal-close{font-size:1.4rem;color:var(--muted);cursor:pointer;background:none;border:none;line-height:1}
.modal-search-wrap{padding:10px 16px 6px;flex-shrink:0}
.modal-filter-wrap{padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.fchip{
  padding:6px 12px;border-radius:20px;
  font-size:0.72rem;font-weight:600;border:1.5px solid var(--border);
  background:var(--card);color:var(--bark);cursor:pointer;
  font-family:inherit;transition:all 0.15s;
}
.fchip.on{background:var(--saffron);border-color:var(--saffron);color:#fff}
.modal-list{overflow-y:auto;padding:0 16px calc(16px + var(--sb));flex:1}
.meal-option{
  padding:11px 13px;border:1.5px solid var(--border);
  border-radius:11px;margin-bottom:8px;cursor:pointer;transition:all 0.12s;
}
.meal-option.selected{border-color:var(--saffron);background:#FEF0E6}
.opt-name{font-size:0.88rem;font-weight:600;margin-bottom:3px}
.opt-meta{font-size:0.7rem;color:var(--muted);line-height:1.35}

.gcat-hdr{
  font-size:0.62rem;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);font-weight:700;
  padding:10px 0 5px;border-bottom:1px solid var(--border);margin-bottom:8px;
}
.gitems{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.gitem{
  padding:5px 11px;border-radius:9px;font-size:0.78rem;
  border:1px solid var(--border);background:var(--card);cursor:pointer;
  transition:all 0.12s;user-select:none;
}
.gitem.have{background:var(--green);border-color:var(--green);color:#fff;text-decoration:line-through;opacity:0.55}

.export-bar{
  position:sticky;bottom:0;
  background:var(--cream);border-top:1px solid var(--border);
  padding:10px 14px calc(10px + var(--sb));
  display:none;gap:8px;
}

.recipe-item{
  padding:11px 13px;border:1px solid var(--border);
  border-radius:11px;margin-bottom:8px;background:var(--card);
}
.recipe-name{font-size:0.88rem;font-weight:600}

.tips{
  background:linear-gradient(135deg,#FFF8EE,#FEF2DC);
  border:1px solid #E8C87A;border-radius:12px;
  padding:11px 13px;font-size:0.78rem;line-height:1.6;margin-bottom:14px;
}
.tips strong{color:var(--saffron)}

.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.88rem;line-height:1.7}
.em{font-size:2.2rem;margin-bottom:10px}

.search{
  width:100%;padding:10px 13px;border:1.5px solid var(--border);
  border-radius:10px;font-size:16px;font-family:inherit;
  background:var(--card);color:var(--bark);margin-bottom:12px;outline:none;
}
.search:focus{border-color:var(--saffron)}

.install-hint{
  background:var(--deep);color:var(--muted);
  font-size:0.72rem;line-height:1.5;
  padding:10px 14px;text-align:center;flex-shrink:0;
}
.install-hint strong{color:var(--gold)}
</style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body>

<div class="hdr">
  <div class="logo">Rasoi</div>
  <div class="hdr-sub" id="weekLabel"></div>
</div>

<div class="tabs">
  <div class="tab on" onclick="showTab('plan')" id="tab-plan"><span class="ti">📅</span>Plan</div>
  <div class="tab" onclick="showTab('grocery')" id="tab-grocery"><span class="ti">🛒</span>Grocery</div>
  <div class="tab" onclick="showTab('recipes')" id="tab-recipes"><span class="ti">📖</span>Recipes</div>
</div>

<!-- PLAN -->
<div class="pane on" id="pane-plan">
  <div class="vibe-row" id="vibeRow"></div>

  <div class="card">
    <div style="font-size:0.72rem;color:var(--muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px">Cook once, eat for both meals?</div>
    <div style="display:flex;gap:8px">
      <button class="vchip on" id="btnNo" onclick="setSameDay(false)">Different meals</button>
      <button class="vchip" id="btnYes" onclick="setSameDay(true)">Same dish × 2</button>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:0">
    <button class="btn btn-primary" style="flex:1" onclick="generatePlan()">✦ Generate</button>
    <button class="btn btn-outline" style="flex:1;margin-top:0" onclick="sharePlan()">📤 Share Plan</button>
  </div>
  <div id="planArea"></div>
</div>

<!-- GROCERY -->
<div class="pane" id="pane-grocery">
  <div id="groceryArea">
    <div class="empty"><div class="em">🛒</div>Generate a meal plan first.</div>
  </div>
  <div class="export-bar" id="exportBar">
    <button class="btn btn-primary btn-sm" onclick="exportList()">📤 Share needed items</button>
    <button class="btn btn-outline btn-sm" onclick="clearHave()">Reset</button>
  </div>
</div>

<!-- RECIPES -->
<div class="pane" id="pane-recipes">
  <input class="search" placeholder="Search recipes…" oninput="renderRecipes(this.value)">
  <div id="recipeList"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="editTitle">Choose meal</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-search-wrap">
      <input class="search" style="margin-bottom:0" placeholder="Filter…" oninput="renderModalList(this.value)" id="modalSearch">
    </div>
    <div class="modal-filter-wrap">
      <button class="fchip" id="fchip-rice" onclick="setModalFilter('rice')">🍚 Rice-based</button>
      <button class="fchip" id="fchip-roti" onclick="setModalFilter('roti')">🫓 Roti-based</button>
      <button class="fchip" id="fchip-quick" onclick="setModalFilter('quick')">⚡ Quick Meal</button>
      <button class="fchip" id="fchip-protein" onclick="setModalFilter('protein')">💪 High-protein</button>
    </div>
    <div class="modal-list" id="modalList"></div>
  </div>
</div>

<div class="install-hint" id="installHint">
  📲 <strong>iPhone:</strong> Share → Add to Home Screen &nbsp;·&nbsp; <strong>Android:</strong> Menu → Add to Home Screen
  <div style="margin-top:5px;font-size:0.62rem;opacity:0.45">by Akshay Iyer</div>
</div>

function setWeekLabel() {
  var now = new Date();
  var mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  var sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  var fmt = function(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
  document.getElementById('weekLabel').textContent = fmt(mon) + ' – ' + fmt(sun);
}

function buildVibeRow() {

    {id:'egg',    label:'🥚 Veg + Eggs'},

  ];
  var html = '';
  for (var i = 0; i < diets.length; i++) {
    var d = diets[i];
    html += '<button class="vchip' + (d.id === vibe ? ' on' : '') + '" onclick="setVibe(\'' + d.id + '\')">' + d.label + '</button>';
  }
  document.getElementById('vibeRow').innerHTML = html;
}

// ─────────────────────────────────────────────
// GENERATE
// ─────────────────────────────────────────────
function generatePlan() {
  var all = RECIPES.slice();
  var specialPool = [];
  var basePool;

  if (vibe === 'veg') {
    basePool = all.filter(function(r){ return !r.egg && !r.nonveg; });
  } else if (vibe === 'egg') {
    basePool    = all.filter(function(r){ return !r.egg && !r.nonveg; });
    specialPool = all.filter(function(r){ return r.egg; });
  } else {
    basePool    = all.filter(function(r){ return !r.nonveg; });
    specialPool = all.filter(function(r){ return r.nonveg; });
  }
  basePool    = shuffle(basePool);
  specialPool = shuffle(specialPool);

  var LIMIT = 2;

  // Pick exactly LIMIT days for special meals, rest get base-only
  var specialDays = {};
  if (specialPool.length) {
    var dayOrder = shuffle([0,1,2,3,4,5,6]);
    for (var s = 0; s < Math.min(LIMIT, specialPool.length); s++) specialDays[dayOrder[s]] = true;
  }

  var usedSpecial = {};
  var usedBase = {};
  plan = [];

  for (var i = 0; i < 7; i++) {
    var lunch = specialDays[i] ? pickFrom(specialPool, usedSpecial) : pickFrom(basePool, usedBase);
    var dinner = sameDay ? lunch : pickFrom(basePool, usedBase);
    plan.push({ day: DAYS[i], lunch: lunch, dinner: dinner });
  }

  saveState();
  renderPlan();
  renderGrocery();
}

function pickFrom(pool, used) {
  var candidates = pool.filter(function(r){ return !used[r.name]; });
  if (!candidates.length) candidates = pool;
  var r = candidates[Math.floor(Math.random() * candidates.length)];
  used[r.name] = true;
  return r;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ─────────────────────────────────────────────
// RENDER PLAN
// ─────────────────────────────────────────────
function mealTag(r) {
  if (r.nonveg) return ' 🍗';
  if (r.egg)    return ' 🥚';
  return '';
}

function nutrBar(meal) {
  var n = meal.nutrition;
  if (!n) return '';
  return '<div class="macro-bar"><span>' + n.cal + '</span> cal &nbsp;·&nbsp; <span>' + n.protein + 'g</span> protein</div>' +
         '<div class="macro-detail"><span>' + n.carbs + 'g</span> carbs &nbsp;·&nbsp; <span>' + n.fat + 'g</span> fat &nbsp;·&nbsp; <span>' + n.fiber + 'g</span> fiber</div>';
}

function tbadge(t) {
  var map = {quick:'b-quick ⚡ Quick', medium:'b-medium 🕐 Medium', prep:'b-prep 💧 Soak first', long:'b-long ⏳ Long cook'};
  var s = (map[t] || map.medium).split(' ');
  return '<span class="badge ' + s[0] + '">' + s.slice(1).join(' ') + '</span>';
}

function renderPlan() {
  if (!plan.length) return;

  var soakDays = [];
  for (var i = 0; i < plan.length; i++) {
    var d = plan[i];
    if (d.lunch.time === 'prep' || d.dinner.time === 'prep') soakDays.push(d.day);
  }

  var html = '';
  if (soakDays.length) {
    html += '<div class="tips" style="margin-top:14px">🫘 <strong>Soak Sunday night</strong> for ' + soakDays.join(', ') + '</div>';
  }

  html += '<div class="week-grid">';
  for (var i = 0; i < plan.length; i++) {
    var d = plan[i];
    var isWeekend = i >= 5;
    var same = d.lunch.name === d.dinner.name;

    html += '<div class="day-card">';
    html += '<div class="day-hdr"><span>' + d.day + '</span><span class="day-tag">' + (isWeekend ? 'Weekend' : 'Weekday') + '</span></div>';
    html += '<div class="meals-grid">';

    // LUNCH
    html += '<div class="meal-cell">';
    html += '<div class="meal-label">Lunch</div>';
    html += '<div class="meal-name">' + d.lunch.name + mealTag(d.lunch) + '</div>';
    html += tbadge(d.lunch.time);
    html += nutrBar(d.lunch);
    if (same) {
      html += '<br><button class="edit-btn" onclick="openEdit(' + i + ',\'both\')">change</button>';
    } else {
      html += '<br><button class="edit-btn" onclick="openEdit(' + i + ',\'lunch\')">change</button>';
    }
    html += '</div>';

    // DINNER
    html += '<div class="meal-cell">';
    html += '<div class="meal-label">Dinner</div>';
    html += '<div class="meal-name">' + d.dinner.name + mealTag(d.dinner) + '</div>';
    html += tbadge(d.dinner.time);
    html += nutrBar(d.dinner);
    if (!same) html += '<br><button class="edit-btn" onclick="openEdit(' + i + ',\'dinner\')">change</button>';
    html += '</div>';

    html += '</div></div>';
  }
  html += '</div>';
  document.getElementById('planArea').innerHTML = html;
}

function openEdit(dayIdx, slot) {
  editTarget = {dayIdx: dayIdx, slot: slot};
  var label = slot === 'both' ? plan[dayIdx].day : plan[dayIdx].day + ' ' + slot;
  document.getElementById('editTitle').textContent = 'Change — ' + label;
  document.getElementById('modalSearch').value = '';
  modalFilter = null;
  var chips = document.querySelectorAll('.fchip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('on');
  renderModalList('');
  document.getElementById('editModal').classList.add('on');
}

function setModalFilter(f) {
  modalFilter = (modalFilter === f) ? null : f;
  var chips = document.querySelectorAll('.fchip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('on');
  if (modalFilter) {
    var el = document.getElementById('fchip-' + f);
    if (el) el.classList.add('on');
  }
  renderModalList(document.getElementById('modalSearch').value);
}

function closeModal() {
  document.getElementById('editModal').classList.remove('on');
  document.querySelector('.modal').style.marginBottom = '';
  editTarget = null;
}

function bgClose(e) {
  if (e.target === document.getElementById('editModal')) closeModal();
}


function renderModalList(q) {
  var q2 = q.toLowerCase();
  var list = q2 ? RECIPES.filter(function(r){ return r.name.toLowerCase().indexOf(q2) !== -1; }) : RECIPES.slice();
  if (vibe === 'veg') list = list.filter(function(r){ return !r.egg && !r.nonveg; });
  if (vibe === 'egg') list = list.filter(function(r){ return !r.nonveg; });

  if (modalFilter === 'rice') {
    list = list.filter(function(r) {
      var n = r.name.toLowerCase();
      return n.indexOf('rice') !== -1 || n.indexOf('pulao') !== -1 || n.indexOf('biryani') !== -1 ||
             n.indexOf('chawal') !== -1 || n.indexOf('khichdi') !== -1 ||
             (r.ingredients && r.ingredients.some(function(ing){ return ing.toLowerCase().indexOf('rice') !== -1; }));
    });
  } else if (modalFilter === 'roti') {
    list = list.filter(function(r) {
      var n = r.name.toLowerCase();
      return n.indexOf('roti') !== -1 || n.indexOf('chapati') !== -1 || n.indexOf('paratha') !== -1 ||
             (r.ingredients && r.ingredients.some(function(ing){ return ing.toLowerCase().indexOf('roti') !== -1; }));
    });
  } else if (modalFilter === 'quick') {
    list = list.filter(function(r){ return r.time === 'quick'; });
  } else if (modalFilter === 'protein') {
    list = list.filter(function(r){ return r.nutrition && r.nutrition.protein >= 20; });
  }

  var cur = editTarget ? plan[editTarget.dayIdx].lunch.name : '';
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var r = list[i];
    var sel = r.name === cur ? ' selected' : '';
    // escape single quotes in name for onclick
    var safeName = r.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<div class="meal-option' + sel + '" onclick="selectMeal(\'' + safeName + '\')">';
    html += '<div class="opt-name">' + r.name + mealTag(r) + '</div>';
    html += '<div class="opt-meta">' + tbadge(r.time) + ' ' + r.note + '</div>';
    html += '</div>';
  }
  document.getElementById('modalList').innerHTML = html || '<div class="empty">No matches</div>';
}

function selectMeal(name) {
  if (!editTarget) return;
  var recipe = null;
  for (var i = 0; i < RECIPES.length; i++) {
    if (RECIPES[i].name === name) { recipe = RECIPES[i]; break; }
  }
  if (!recipe) return;
  var di = editTarget.dayIdx;
  var slot = editTarget.slot;
  if (slot === 'lunch' || slot === 'both') plan[di].lunch = recipe;
  if (slot === 'dinner' || slot === 'both') plan[di].dinner = recipe;
  closeModal();
  saveState();
  renderPlan();
  renderGrocery();
}

// ─────────────────────────────────────────────
// GROCERY
// ─────────────────────────────────────────────
function getMealIngredients() {
  var seen = {};
  var items = [];
  for (var i = 0; i < plan.length; i++) {
    var meals = plan[i].lunch.name === plan[i].dinner.name
      ? [plan[i].lunch]
      : [plan[i].lunch, plan[i].dinner];
    for (var j = 0; j < meals.length; j++) {
      var ings = meals[j].ingredients || [];
      for (var k = 0; k < ings.length; k++) {
        if (!seen[ings[k]]) { seen[ings[k]] = true; items.push(ings[k]); }
      }
    }
  }
  return items.sort();
}

function renderGrocery() {
  if (!plan.length) return;
  var mealItems = getMealIngredients();

  var html = '<div class="tips">Tap items you <strong>already have</strong> to cross them off. Then export the rest.</div>';

  html += '<div class="gcat-hdr">This Week\'s Ingredients</div><div class="gitems">';
  for (var i = 0; i < mealItems.length; i++) {
    var item = mealItems[i];
    var safeName = item.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<div class="gitem' + (haveItems.has(item) ? ' have' : '') + '" onclick="toggleHave(\'' + safeName + '\')">' + item + '</div>';
  }
  html += '</div>';

  var cats = Object.keys(PANTRY);
  for (var c = 0; c < cats.length; c++) {
    var cat = cats[c];
    var catItems = PANTRY[cat];
    html += '<div class="gcat-hdr">' + cat + '</div><div class="gitems">';
    for (var p = 0; p < catItems.length; p++) {
      var item = catItems[p];
      var safeName = item.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html += '<div class="gitem' + (haveItems.has(item) ? ' have' : '') + '" onclick="toggleHave(\'' + safeName + '\')">' + item + '</div>';
    }
    html += '</div>';
  }

  document.getElementById('groceryArea').innerHTML = html;
  document.getElementById('exportBar').style.display = 'flex';
}

function toggleHave(item) {
  if (haveItems.has(item)) haveItems.delete(item);
  else haveItems.add(item);
  saveState();
  renderGrocery();
}

function clearHave() {
  haveItems.clear();
  saveState();
  renderGrocery();
}

function sharePlan() {
  if (!plan.length) { alert('Generate a plan first!'); return; }
  var lines = ['RASOI — MEAL PLAN', ''];
  var weekEl = document.getElementById('weekLabel');
  if (weekEl) lines.push(weekEl.textContent, '');
  for (var i = 0; i < plan.length; i++) {
    var d = plan[i];
    var same = d.lunch.name === d.dinner.name;
    lines.push(d.day.toUpperCase());
    lines.push('  Lunch:  ' + d.lunch.name);
    if (same) {
      lines.push('  Dinner: (same — cook larger qty)');
    } else {
      lines.push('  Dinner: ' + d.dinner.name);
    }
    lines.push('');
  }
  var soakDays = [];
  for (var i = 0; i < plan.length; i++) {
    if (plan[i].lunch.time === 'prep' || plan[i].dinner.time === 'prep') soakDays.push(plan[i].day);
  }
  if (soakDays.length) lines.push('Soak ahead: ' + soakDays.join(', '));
  var text = lines.join('\n');
  if (navigator.share) {
    navigator.share({title:'Rasoi Meal Plan', text:text});
  } else {
    navigator.clipboard.writeText(text).then(function(){ alert('Plan copied!'); });
  }
}

function exportList() {
  var mealItems = getMealIngredients();
  var lines = ['RASOI — GROCERY LIST', ''];

  var needed = mealItems.filter(function(i){ return !haveItems.has(i); });
  if (needed.length) {
    lines.push('THIS WEEK');
    for (var i = 0; i < needed.length; i++) lines.push('- ' + needed[i]);
    lines.push('');
  }

  var cats = Object.keys(PANTRY);
  for (var c = 0; c < cats.length; c++) {
    var cat = cats[c];
    var catNeeded = PANTRY[cat].filter(function(i){ return !haveItems.has(i); });
    if (catNeeded.length) {
      lines.push(cat.toUpperCase());
      for (var p = 0; p < catNeeded.length; p++) lines.push('- ' + catNeeded[p]);
      lines.push('');
    }
  }

  var text = lines.join('\n');
  if (navigator.share) {
    navigator.share({title:'Rasoi Grocery List', text:text});
  } else {
    navigator.clipboard.writeText(text).then(function(){ alert('Copied to clipboard!'); });
  }
}

// ─────────────────────────────────────────────
// RECIPES TAB
// ─────────────────────────────────────────────
function renderRecipes(q) {
  q = (q || '').toLowerCase();
  var list = q ? RECIPES.filter(function(r){ return r.name.toLowerCase().indexOf(q) !== -1; }) : RECIPES;
  var timeLabel = {quick:'⚡ Quick (under 25 min)', medium:'🕐 Medium (25–40 min)', prep:'💧 Soak ahead', long:'⏳ Weekend cook'};

  function buildSection(items, sectionLabel) {
    var groups = {quick:[], medium:[], prep:[], long:[]};
    for (var i = 0; i < items.length; i++) {
      var t = items[i].time;
      if (groups[t]) groups[t].push(items[i]);
    }
    var html = '';
    var keys = ['quick','medium','prep','long'];
    var hasAny = false;
    for (var k = 0; k < keys.length; k++) {
      if (groups[keys[k]].length) { hasAny = true; break; }
    }
    if (!hasAny) return '';
    html += '<div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:14px 0 6px;border-bottom:2px solid var(--border);margin-bottom:8px">' + sectionLabel + '</div>';
    for (var k = 0; k < keys.length; k++) {
      var key = keys[k];
      if (!groups[key].length) continue;
      html += '<div class="gcat-hdr">' + timeLabel[key] + '</div>';
      for (var i = 0; i < groups[key].length; i++) {
        var r = groups[key][i];
        var mainDish = r.name.split(' with ')[0].split(' With ')[0];
        var query = encodeURIComponent(mainDish + ' recipe');
        html += '<div class="recipe-item" style="cursor:pointer" onclick="window.open(\'https://www.youtube.com/results?search_query=' + query + '\',\'_blank\')">';
        html += '<div class="recipe-name">' + r.name + mealTag(r) + ' <span style="font-size:0.65rem;color:var(--muted);font-weight:400">▶ YouTube</span></div>';
        html += '</div>';
      }
    }
    return html;
  }

  var vegList    = list.filter(function(r){ return !r.egg && !r.nonveg; });
  var eggList    = list.filter(function(r){ return r.egg; });
  var nonvegList = list.filter(function(r){ return r.nonveg; });
  var html = buildSection(vegList, '🥦 Vegetarian');
  if (eggList.length)    html += buildSection(eggList,    '🥚 Egg');
  if (nonvegList.length) html += buildSection(nonvegList, '🍗 Chicken');
  document.getElementById('recipeList').innerHTML = html || '<div class="empty">No recipes found</div>';
}


// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function showTab(id) {
  var panes = document.querySelectorAll('.pane');
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < panes.length; i++) panes[i].classList.remove('on');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('on');
  document.getElementById('pane-' + id).classList.add('on');
  document.getElementById('tab-' + id).classList.add('on');
}

// ─────────────────────────────────────────────
// PERSIST
// ─────────────────────────────────────────────
function saveState() {
  try {
    localStorage.setItem('rasoi_plan', JSON.stringify(plan));
    localStorage.setItem('rasoi_have', JSON.stringify(Array.from(haveItems)));
    localStorage.setItem('rasoi_vibe', vibe);
    localStorage.setItem('rasoi_same', JSON.stringify(sameDay));
  } catch(e) {}
}

function loadState() {
  try {
    var p = localStorage.getItem('rasoi_plan');
    if (p) plan = JSON.parse(p);
    var h = localStorage.getItem('rasoi_have');
    if (h) haveItems = new Set(JSON.parse(h));
    var v = localStorage.getItem('rasoi_vibe');
    if (v) { vibe = v; buildVibeRow(); }
    var s = localStorage.getItem('rasoi_same');
    if (s !== null) { sameDay = JSON.parse(s); setSameDay(sameDay); }
  } catch(e) {}
}

// ─────────────────────────────────────────────
// iOS KEYBOARD — lift modal above keyboard
// ─────────────────────────────────────────────
if (window.visualViewport) {
  function onViewportResize() {
    var modal = document.querySelector('.modal-bg.on .modal');
    if (!modal) return;
    var keyboardHeight = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
    modal.style.marginBottom = Math.max(0, keyboardHeight) + 'px';
  }
  window.visualViewport.addEventListener('resize', onViewportResize);
  window.visualViewport.addEventListener('scroll', onViewportResize);
}
</script>
<script>
// ── AUTO-UPDATE ──────────────────────────────
// Registers a minimal service worker that always fetches fresh from network.
// On any update, reloads the page automatically so GitHub pushes take effect.
if ('serviceWorker' in navigator) {
  var SW_CODE = [
    "const VERSION = '" + Date.now() + "';",
    "self.addEventListener('install', function(e) {",
    "  self.skipWaiting();",
    "});",
    "self.addEventListener('activate', function(e) {",
    "  e.waitUntil(clients.claim());",
    "});",
    "self.addEventListener('fetch', function(e) {",
    "  e.respondWith(",
    "    fetch(e.request, {cache: 'no-store'}).catch(function() {",
    "      return caches.match(e.request);",
    "    })",
    "  );",
    "});"
  ].join('\n');

  var blob = new Blob([SW_CODE], {type: 'application/javascript'});
  var swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl).then(function(reg) {
    reg.addEventListener('updatefound', function() {
      var newWorker = reg.installing;
      newWorker.addEventListener('statechange', function() {
        if (newWorker.state === 'activated') {
          window.location.reload();
        }
      });
    });
    // Check for updates every time page gains focus
    window.addEventListener('focus', function() {
      reg.update();
    });
    // Also check on visibility change (returning to app)
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') reg.update();
    });
  }).catch(function(e) {
    console.log('SW not supported in this context:', e.message);
  });
}
</script>
